<title>Space Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#3f51b5 0,#0b1026 45%,#02030a 100%);
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:white;
overflow:hidden
}

.calculator{
background:linear-gradient(145deg,#1b1f3b,#121628);
border-radius:24px;
padding:40px 20px 32px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
width:320px;
border:3px solid #7c4dff;
position:relative;
overflow:visible
}

/* PARTICLES */

#particleCanvas{
position:absolute;
inset:-140px;
pointer-events:none;
z-index:10
}

.calculator::before{
content:"🚀 SPACE MATH";
position:absolute;
top:14px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(90deg,#ff9800,#ff4081);
padding:4px 30px;
border-radius:999px;
font-size:13px;
letter-spacing:1px
}

/* DISPLAY */

.display-wrapper{
background:#020411;
border-radius:16px;
padding:10px;
margin-top:18px;
margin-bottom:14px;
border:2px solid #263238
}

.display{
width:100%;
border:none;
background:transparent;
color:#76ff03;
font-family:'Share Tech Mono',monospace;
font-size:28px;
text-align:right;
outline:none;
letter-spacing:1px;
text-shadow:0 0 4px #76ff03,0 0 10px rgba(118,255,3,.6)
}

/* BUTTON GRID */

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px
}

button{
border:none;
border-radius:16px;
padding:12px;
font-size:24px;
cursor:pointer;
color:white;
font-weight:700;
transition:transform .08s ease,box-shadow .08s ease,filter .08s ease;
box-shadow:inset 1px 1px 0 rgba(255,255,255,.35),0 3px 8px rgba(0,0,0,.35)
}

button:active{
filter:brightness(.95);
transform:translateY(3px);
box-shadow:inset 0 3px 6px rgba(0,0,0,.4)
}
