<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
background:radial-gradient(circle at top,#3f51b5 0,#0b1026 45%,#02030a 100%);
color:#fff
}

.calculator{
background:linear-gradient(145deg,#1b1f3b,#121628);
border-radius:24px;
padding:40px 20px 32px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
width:320px;
border:3px solid #7c4dff;
position:relative
}

.calculator::before{
content:"🚀 SPACE MATH";
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(90deg,#ff9800,#ff4081);
padding:4px 30px;
border-radius:999px;
font-size:13px;
letter-spacing:1.2px
}

.display-wrapper{
background:#020411;
border-radius:16px;
padding:10px;
margin-top:18px;
margin-bottom:14px;
border:2px solid #263238
}

.display{
width:100%;
border:none;
background:transparent;
color:#76ff03;
font-family:'Share Tech Mono',monospace;
font-size:28px;
text-align:right;
outline:none;
text-shadow:0 0 4px #76ff03,0 0 10px rgba(118,255,3,.6)
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px
}

button{
border:none;
border-radius:16px;
padding:12px;
font-size:24px;
cursor:pointer;
color:#fff;
font-weight:700;
transition:.08s;
box-shadow:inset 1px 1px 0 rgba(255,255,255,.35),0 3px 8px rgba(0,0,0,.35)
}

button:active{
transform:translateY(3px)
}

.num{background:radial-gradient(circle at 30% 30%,#ffe082,#ffb300)}
.operator{background:linear-gradient(135deg,#ff4081,#f50057)}
.dot{background:radial-gradient(circle at 30% 30%,#ce93d8,#6a1b9a)}
.backspace{background:radial-gradient(circle at 30% 30%,#b39ddb,#5e35b1)}

.clear{
grid-column:1/-1;
background:
repeating-linear-gradient(
45deg,
rgba(90,0,0,.55) 0px,
rgba(90,0,0,.55) 16px,
transparent 16px,
transparent 32px),
linear-gradient(135deg,#ff1744,#d50000)
}

.equals{
background:linear-gradient(135deg,#00e5ff,#00b0ff);
grid-column:1/-1
}

.backspace-ship{
display:inline-block;
transform:rotate(225deg);
font-size:26px
}
</style>
</head>

<body>

<div class="calculator">

<div class="display-wrapper">
<input id="display" class="display" readonly>
</div>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">CLEAR</button>

<button class="num" onclick="appendNumber('7')">7</button>
<button class="num" onclick="appendNumber('8')">8</button>
<button class="num" onclick="appendNumber('9')">9</button>
<button class="operator" onclick="appendOperator('/')">÷</button>

<button class="num" onclick="appendNumber('4')">4</button>
<button class="num" onclick="appendNumber('5')">5</button>
<button class="num" onclick="appendNumber('6')">6</button>
<button class="operator" onclick="appendOperator('*')">×</button>

<button class="num" onclick="appendNumber('1')">1</button>
<button class="num" onclick="appendNumber('2')">2</button>
<button class="num" onclick="appendNumber('3')">3</button>
<button class="operator" onclick="appendOperator('-')">−</button>

<button class="num" onclick="appendNumber('0')">0</button>
<button class="dot" onclick="appendDot()">.</button>

<button class="backspace" onclick="backspace()">
<span class="backspace-ship">🚀</span>
</button>

<button class="operator" onclick="appendOperator('+')">+</button>

<button class="equals" onclick="calculate()">= LAUNCH</button>

</div>
</div>

<script>

const display=document.getElementById("display")

let expression=""
let lastOperator=null
let lastOperand=null
let justCalculated=false

function formatNumber(n){
const parts=n.split(".")
parts[0]=Number(parts[0]).toLocaleString("en-US")
return parts.join(".")
}

function updateDisplay(){

let parts=expression.split(/([+\-*/])/)

let formatted=""

for(let part of parts){

if(/[+\-*/]/.test(part)){

if(part==="/")formatted+="÷"
else if(part==="*")formatted+="×"
else formatted+=part

}else{

if(part!=="")formatted+=formatNumber(part)

}

}

display.value=formatted
}

function appendNumber(n){

if(justCalculated){
expression=""
justCalculated=false
}

expression+=n
updateDisplay()
}

function appendDot(){

let parts=expression.split(/[+\-*/]/)
let last=parts[parts.length-1]

if(last.includes("."))return

expression+="."
updateDisplay()
}

function appendOperator(op){

if(expression==="")return

if(/[+\-*/]$/.test(expression))return

expression+=op
updateDisplay()
}

function backspace(){

expression=expression.slice(0,-1)
updateDisplay()
}

function clearDisplay(){

expression=""
display.value=""
lastOperator=null
lastOperand=null
justCalculated=false
}

function calculate(){

if(expression==="")return

if(/[+\-*/]$/.test(expression))return

try{

let result=Function('"use strict";return ('+expression+')')()

const match=expression.match(/([+\-*/])(\d+\.?\d*)$/)

if(match){

lastOperator=match[1]
lastOperand=match[2]

}

expression=result.toString()

display.value=formatNumber(expression)

justCalculated=true

}
catch{

display.value="ERROR IN SPACE"

setTimeout(()=>{

display.value=""
expression=""

},1000)

}

}

</script>

</body>
</html>
