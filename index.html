<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Space Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

* { box-sizing: border-box; }

body {
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:radial-gradient(circle at top,#3f51b5 0,#0b1026 45%,#02030a 100%);
color:#fff;
overflow:hidden;
}

.calculator{
background:linear-gradient(145deg,#1b1f3b,#121628);
border-radius:24px;
padding:40px 20px 32px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
width:320px;
border:3px solid #7c4dff;
position:relative;
}

.calculator::before{
content:"🚀 SPACE MATH";
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(90deg,#ff9800,#ff4081);
color:#fff;
padding:4px 30px;
border-radius:999px;
font-size:13px;
letter-spacing:1.2px;
}

.display-wrapper{
background:#020411;
border-radius:16px;
padding:10px;
margin-top:18px;
margin-bottom:14px;
border:2px solid #263238;
}

.display{
width:100%;
border:none;
background:transparent;
color:#76ff03;
font-family:'Share Tech Mono',monospace;
font-size:28px;
letter-spacing:1px;
text-align:right;
outline:none;
text-shadow:0 0 4px #76ff03,0 0 10px rgba(118,255,3,.6);
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
border:none;
border-radius:16px;
padding:12px;
font-size:24px;
cursor:pointer;
color:#fff;
font-weight:700;
transition:transform .08s ease,box-shadow .08s ease,filter .08s ease;
box-shadow:inset 1px 1px 0 rgba(255,255,255,.35),0 3px 8px rgba(0,0,0,.35);
}

button:active{
filter:brightness(.95);
transform:translateY(3px);
box-shadow:inset 0 3px 6px rgba(0,0,0,.4);
}

.num-7{background:radial-gradient(circle at 30% 30%,#ffeb3b,#ff9800);}
.num-8{background:radial-gradient(circle at 30% 30%,#b388ff,#7c4dff);}
.num-9{background:radial-gradient(circle at 30% 30%,#ff8a80,#e53935);}

.num-4{background:radial-gradient(circle at 30% 30%,#40c4ff,#0277bd);}
.num-5{background:radial-gradient(circle at 30% 30%,#69f0ae,#00c853);}
.num-6{background:radial-gradient(circle at 30% 30%,#f48fb1,#d81b60);}

.num-1{background:radial-gradient(circle at 30% 30%,#ffe082,#ffb300);}
.num-2{background:radial-gradient(circle at 30% 30%,#80d8ff,#0091ea);}
.num-3{background:radial-gradient(circle at 30% 30%,#80cbc4,#00695c);}

.num-0{background:radial-gradient(circle at 30% 30%,#a5d6a7,#2e7d32);}

.operator{background:linear-gradient(135deg,#ff4081,#f50057);}

.clear{
background:
repeating-linear-gradient(
45deg,
rgba(90,0,0,.55) 0px,
rgba(90,0,0,.55) 18px,
transparent 18px,
transparent 36px
),
linear-gradient(135deg,#ff1744,#d50000);
grid-column:1/-1;
}

.backspace{
background:radial-gradient(circle at 30% 30%,#b39ddb,#5e35b1);
}

.backspace-ship{
display:inline-block;
font-size:26px;
transform:rotate(225deg);
}

.dot{
background:radial-gradient(circle at 30% 30%,#ce93d8,#6a1b9a);
}

.equals{
background:linear-gradient(135deg,#00e5ff,#00b0ff);
grid-column:1/-1;
}

</style>
</head>

<body>

<div class="calculator">

<div class="display-wrapper">
<input id="display" class="display" type="text" readonly />
</div>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">CLEAR</button>

<button class="num-7" onclick="appendNumber('7')">7</button>
<button class="num-8" onclick="appendNumber('8')">8</button>
<button class="num-9" onclick="appendNumber('9')">9</button>
<button class="operator" onclick="appendOperator('/')">÷</button>

<button class="num-4" onclick="appendNumber('4')">4</button>
<button class="num-5" onclick="appendNumber('5')">5</button>
<button class="num-6" onclick="appendNumber('6')">6</button>
<button class="operator" onclick="appendOperator('*')">×</button>

<button class="num-1" onclick="appendNumber('1')">1</button>
<button class="num-2" onclick="appendNumber('2')">2</button>
<button class="num-3" onclick="appendNumber('3')">3</button>
<button class="operator" onclick="appendOperator('-')">−</button>

<button class="num-0" onclick="appendNumber('0')">0</button>
<button class="dot" onclick="appendDot()">.</button>

<button class="backspace" onclick="backspace()">
<span class="backspace-ship">🚀</span>
</button>

<button class="operator" onclick="appendOperator('+')">+</button>

<button class="equals" onclick="calculate()">= LAUNCH</button>

</div>
</div>

<script>

const display=document.getElementById('display')

let raw=""
let lastOperator=null
let lastOperand=null
let justCalculated=false

/* -------- SOUND SYSTEM (UNCHANGED) -------- */

let audioCtx=null

function getCtx(){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()
return audioCtx
}

function spaceBeep(opts){
const ctx=getCtx()
const freq=opts.freq??440
const duration=opts.duration??0.06

const gain=ctx.createGain()
gain.connect(ctx.destination)
gain.gain.setValueAtTime(.12,ctx.currentTime)
gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration)

const osc=ctx.createOscillator()
osc.type='square'
osc.frequency.setValueAtTime(freq,ctx.currentTime)

osc.connect(gain)
osc.start(ctx.currentTime)
osc.stop(ctx.currentTime+duration)
}

function takeoffSound(){spaceBeep({freq:120});setTimeout(()=>spaceBeep({freq:500}),80)}

function explosionSound(){spaceBeep({freq:90});setTimeout(()=>spaceBeep({freq:40}),60)}

function playBeep(k){
if(/\d/.test(k))spaceBeep({freq:260+20*k})
if(k=='.')spaceBeep({freq:880})
if(['+','-','*','/'].includes(k))spaceBeep({freq:400})
if(k==='equals')takeoffSound()
if(k==='clear')explosionSound()
if(k==='back')spaceBeep({freq:200})
}

/* -------- DISPLAY FORMAT -------- */

function format(n){
const p=n.split('.')
p[0]=Number(p[0]).toLocaleString('en-US')
return p.join('.')
}

function updateDisplay(){

let parts=raw.split(/([+\-*/])/)

let out=""

for(let part of parts){

if(/[+\-*/]/.test(part)){

if(part==='/')out+='÷'
else if(part==='*')out+='×'
else out+=part

}else{

if(part!=="")out+=format(part)

}

}

display.value=out
}

/* -------- INPUT -------- */

function appendNumber(n){

playBeep(n)

if(justCalculated){raw="";justCalculated=false}

raw+=n
updateDisplay()
}

function appendDot(){

let parts=raw.split(/[+\-*/]/)
let last=parts[parts.length-1]

if(last.includes('.'))return

playBeep('.')

raw+='.'
updateDisplay()
}

function appendOperator(op){

if(raw===""||/[+\-*/]$/.test(raw))return

playBeep(op)

raw+=op
updateDisplay()
}

function backspace(){

if(raw==="")return

playBeep('back')

raw=raw.slice(0,-1)
updateDisplay()
}

function clearDisplay(){

playBeep('clear')

raw=""
display.value=""
justCalculated=false
}

/* -------- CALCULATE -------- */

function calculate(){

if(raw===""||/[+\-*/]$/.test(raw))return

playBeep('equals')

try{

let result=Function('"use strict";return ('+raw+')')()

const m=raw.match(/([+\-*/])(\d+\.?\d*)$/)

if(m){lastOperator=m[1];lastOperand=m[2]}

raw=result.toString()

display.value=format(raw)

justCalculated=true

}catch{

display.value="ERROR IN SPACE"

setTimeout(()=>{
display.value=""
raw=""
},1000)

}

}

</script>

</body>
</html>
