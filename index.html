<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Space Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:radial-gradient(circle at top,#3f51b5 0,#0b1026 45%,#02030a 100%);
color:#fff;
overflow:hidden;
}

.calculator{
background:linear-gradient(145deg,#1b1f3b,#121628);
border-radius:24px;
padding:40px 20px 32px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
width:320px;
border:3px solid #7c4dff;
position:relative;
overflow:visible;
}

/* PARTICLE CANVAS */

#particleCanvas{
position:absolute;
inset:-120px;
pointer-events:none;
z-index:20;
}

/* Dense stars on case */

.calculator::after{
content:"";
position:absolute;
inset:0;
pointer-events:none;
opacity:.75;
background-image:
radial-gradient(2px 2px at 5% 10%,rgba(255,255,255,.7),transparent),
radial-gradient(2px 2px at 12% 25%,rgba(255,255,255,.6),transparent),
radial-gradient(2px 2px at 20% 18%,rgba(255,255,255,.7),transparent);
}

.calculator::before{
content:"🚀 SPACE MATH";
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(90deg,#ff9800,#ff4081);
color:#fff;
padding:4px 30px;
border-radius:999px;
font-size:13px;
letter-spacing:1.2px;
text-shadow:0 1px 2px rgba(0,0,0,.5);
white-space:nowrap;
z-index:1;
}

.display-wrapper{
background:#020411;
border-radius:16px;
padding:10px;
margin-top:18px;
margin-bottom:14px;
position:relative;
border:2px solid #263238;
z-index:1;
}

.display{
width:100%;
border:none;
background:transparent;
color:#76ff03;
font-family:'Share Tech Mono',monospace;
font-size:28px;
letter-spacing:1px;
text-align:right;
outline:none;
text-shadow:0 0 4px #76ff03,0 0 10px rgba(118,255,3,.6);
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
position:relative;
z-index:1;
}

button{
border:none;
border-radius:16px;
padding:12px;
font-size:24px;
cursor:pointer;
color:#fff;
font-weight:700;
transition:transform .08s ease,box-shadow .08s ease,filter .08s ease;
box-shadow:inset 1px 1px 0 rgba(255,255,255,.35),0 3px 8px rgba(0,0,0,.35);
}

button:active{
filter:brightness(.95);
transform:translateY(3px);
box-shadow:inset 0 3px 6px rgba(0,0,0,.4);
}

.num-7{background:radial-gradient(circle at 30% 30%,#ffeb3b,#ff9800);}
.num-8{background:radial-gradient(circle at 30% 30%,#b388ff,#7c4dff);}
.num-9{background:radial-gradient(circle at 30% 30%,#ff8a80,#e53935);}
.num-4{background:radial-gradient(circle at 30% 30%,#40c4ff,#0277bd);}
.num-5{background:radial-gradient(circle at 30% 30%,#69f0ae,#00c853);}
.num-6{background:radial-gradient(circle at 30% 30%,#f48fb1,#d81b60);}
.num-1{background:radial-gradient(circle at 30% 30%,#ffe082,#ffb300);}
.num-2{background:radial-gradient(circle at 30% 30%,#80d8ff,#0091ea);}
.num-3{background:radial-gradient(circle at 30% 30%,#80cbc4,#00695c);}
.num-0{background:radial-gradient(circle at 30% 30%,#a5d6a7,#2e7d32);}

.operator{background:linear-gradient(135deg,#ff4081,#f50057);}

.clear{
grid-column:1/-1;
background:
repeating-linear-gradient(
45deg,
rgba(90,0,0,.55) 0px,
rgba(90,0,0,.55) 18px,
transparent 18px,
transparent 36px),
linear-gradient(135deg,#ff1744,#d50000);
}

.backspace{background:radial-gradient(circle at 30% 30%,#b39ddb,#5e35b1);}

.backspace-ship{
display:inline-block;
font-size:26px;
transform:rotate(225deg);
}

.dot{background:radial-gradient(circle at 30% 30%,#ce93d8,#6a1b9a);}

.equals{
background:linear-gradient(135deg,#00e5ff,#00b0ff);
grid-column:1/-1;
}
</style>
</head>

<body>

<div class="calculator">

<canvas id="particleCanvas"></canvas>

<div class="display-wrapper">
<input id="display" class="display" type="text" readonly/>
</div>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">CLEAR</button>

<button class="num-7" onclick="append('7')">7</button>
<button class="num-8" onclick="append('8')">8</button>
<button class="num-9" onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="num-4" onclick="append('4')">4</button>
<button class="num-5" onclick="append('5')">5</button>
<button class="num-6" onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>

<button class="num-1" onclick="append('1')">1</button>
<button class="num-2" onclick="append('2')">2</button>
<button class="num-3" onclick="append('3')">3</button>
<button class="operator" onclick="append('-')">−</button>

<button class="num-0" onclick="append('0')">0</button>
<button class="dot" onclick="append('.')">.</button>
<button class="backspace" onclick="backspace()">
<span class="backspace-ship">🚀</span>
</button>
<button class="operator" onclick="append('+')">+</button>

<button class="equals" onclick="calculate()">= LAUNCH</button>

</div>
</div>

<script>

const display=document.getElementById('display')

/* PARTICLE SYSTEM */

const canvas=document.getElementById("particleCanvas")
const ctx=canvas.getContext("2d")

let particles=[]

function resizeCanvas(){
const rect=document.querySelector(".calculator").getBoundingClientRect()
canvas.width=rect.width+240
canvas.height=rect.height+240
}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

function explodeDisplay(text){

if(!text)return

const rect=display.getBoundingClientRect()
const calc=document.querySelector(".calculator").getBoundingClientRect()

const startX=rect.left-calc.left+120
const startY=rect.top-calc.top+120
const charWidth=rect.width/Math.max(text.length,1)

for(let i=0;i<text.length;i++){

const x=startX+i*charWidth+charWidth/2
const y=startY+rect.height/2

for(let j=0;j<10;j++){

particles.push({
x,
y,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
life:60+Math.random()*30,
size:2+Math.random()*3
})

}
}

animateParticles()
}

function animateParticles(){

function frame(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=particles.length-1;i>=0;i--){

const p=particles[i]

p.x+=p.vx
p.y+=p.vy
p.vy+=0.08
p.life--

ctx.fillStyle="#76ff03"
ctx.fillRect(p.x,p.y,p.size,p.size)

if(p.life<=0)particles.splice(i,1)

}

if(particles.length)requestAnimationFrame(frame)
}

requestAnimationFrame(frame)

}

/* AUDIO SYSTEM */

let audioCtx=null
function getCtx(){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()
return audioCtx
}

function spaceBeep(opts){
const ctx=getCtx()
const freq=opts.freq??440
const duration=opts.duration??0.06
const type=opts.type??'square'

const gain=ctx.createGain()
gain.connect(ctx.destination)
gain.gain.setValueAtTime(.12,ctx.currentTime)
gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration)

const osc=ctx.createOscillator()
osc.type=type
osc.frequency.setValueAtTime(freq,ctx.currentTime)
osc.connect(gain)
osc.start(ctx.currentTime)
osc.stop(ctx.currentTime+duration)
}

function explosionSound(){
spaceBeep({freq:90,type:"sawtooth",duration:.3})
}

const beeps={
backspace:()=>spaceBeep({freq:200,type:'triangle',duration:.04}),
equals:()=>spaceBeep({freq:700,type:'square',duration:.12}),
clear:explosionSound
}

function playBeep(key){
const fn=beeps[key]
if(fn)fn()
}

/* CALCULATOR LOGIC */

function append(val){

if(window.justCalculated&&/\d/.test(val)){
display.value=''
window.justCalculated=false
}

if(display.value.length>=18)return

if(val==='/')display.value+='÷'
else if(val==='*')display.value+='×'
else display.value+=val
}

function backspace(){

if(!display.value)return
playBeep('backspace')
display.value=display.value.slice(0,-1)

}

function clearDisplay(){

playBeep('clear')
explodeDisplay(display.value)

display.value=''
window.lastOperator=null
window.lastOperand=null
window.justCalculated=false

}

function calculate(){

if(!display.value.trim())return
playBeep('equals')

try{

let expression=display.value
.replace(/÷/g,'/')
.replace(/×/g,'*')
.replace(/−/g,'-')

const result=Function('"use strict";return ('+expression+')')()

display.value=result
window.justCalculated=true

}catch{

display.value='ERROR IN SPACE'
setTimeout(()=>display.value='',1000)

}

}

window.addEventListener('keydown',e=>{

const key=e.key

if(/\d/.test(key)){append(key);return}
if(key==='.'){append('.');return}
if(['+','-','*','/'].includes(key)){append(key);return}

if(key==='Enter'||key==='='){
e.preventDefault()
calculate()
return
}

if(key==='Escape'||key.toLowerCase()==='c'){
clearDisplay()
return
}

if(key==='Backspace'){
e.preventDefault()
backspace()
}

})

</script>

</body>
</html>
